name: Deploy to Hugging Face Spaces

on:
  push:
    branches: [ main ]
    paths:
      - "neural/**"
      - "symbolic/**"

jobs:
  deploy-gradio:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0 # Ensure full history for git diff

      - name: Check if neural changed
        id: neural_changed
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q "^neural/"; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies
        if: steps.neural_changed.outputs.changed == 'true'
        run: pip install "huggingface_hub[cli]"

      - name: Deploy Gradio Space (Neural Engine)
        if: steps.neural_changed.outputs.changed == 'true'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          hf upload m97j/neural-engine neural/ . \
            --repo-type space \
            --delete "." \
            --commit-message "${{ github.event.head_commit.message }}"

  deploy-docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0 # Ensure full history for git diff

      - name: Check if symbolic changed
        id: symbolic_changed
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q "^symbolic/"; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies
        if: steps.symbolic_changed.outputs.changed == 'true'
        run: pip install "huggingface_hub[cli]"

      - name: Deploy Docker Space (Symbolic Processor)
        if: steps.symbolic_changed.outputs.changed == 'true'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_HUB_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          hf upload m97j/symbolic-processor symbolic/ . \
            --repo-type space \
            --delete "." \
            --commit-message "${{ github.event.head_commit.message }}"
